<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Root Cause Analysis</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    

    
    

    
    
    
    
    
    

    

    main {
      display: grid; grid-template-rows: auto auto 1fr;
      gap: 12px; padding: 12px 24px; overflow: hidden; min-height: 0;
    }

    /* Stats row — 4 cards */
    .stats-row {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
    }

    .stat-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 10px 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      display: flex; flex-direction: column; gap: 4px;
      text-decoration: none; color: inherit;
      transition: border-color 0.15s;
    }
    .stat-card:hover { border-color: var(--green-dim); }

    .stat-value { font-size: 2rem; font-weight: 300; line-height: 1; color: var(--text); }
    .stat-label { font-size: 0.78rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }

    /* Tasks panel */
    .tasks-panel {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); box-shadow: 0 1px 4px rgba(0,0,0,0.06); display: flex; flex-direction: column; overflow: hidden;
    }

    .task-row {
      display: flex; align-items: center; gap: 16px;
      padding: 10px 20px; border-bottom: 1px solid var(--border);
      transition: background 0.15s; min-height: 46px;
    }
    .task-row:last-child { border-bottom: none; }
    .task-row:active { background: var(--border); }

    .task-check {
      width: 28px; height: 28px; border-radius: 8px;
      border: 1.5px solid var(--border); background: var(--bg);
      cursor: pointer; flex-shrink: 0; display: flex; align-items: center;
      justify-content: center; font-size: 0.9rem;
      transition: background 0.15s, border-color 0.15s;
    }
    .task-check:hover { border-color: var(--green-dim); }
    .task-check.done { background: var(--green-dim); border-color: var(--green-dim); color: #fff; }

    .type-icon { font-size: 1.3rem; flex-shrink: 0; }

    .task-info { flex: 1; min-width: 0; }
    .task-title { font-size: 1.1rem; font-weight: 500; }
    .task-sub   { font-size: 0.85rem; color: var(--muted); margin-top: 2px; }

    .task-badge {
      font-size: 0.8rem; font-weight: 500; padding: 5px 12px;
      border-radius: 99px; flex-shrink: 0;
    }
    .badge-overdue  { background: var(--red);       color: #fff; }
    .badge-today    { background: var(--amber);     color: #fff; }
    .badge-upcoming { background: var(--border);    color: var(--muted); }
    .badge-auto     { background: var(--green-dim); color: #fff; }

    /* Weather panel */
    .weather-panel {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); box-shadow: 0 1px 4px rgba(0,0,0,0.06); display: grid;
      grid-template-columns: 220px 1fr; overflow: hidden; min-height: 0;
    }

    .wx-current {
      padding: 16px 18px; border-right: 1px solid var(--border);
      display: flex; flex-direction: column; justify-content: center; gap: 6px;
    }

    .wx-icon  { font-size: 2.4rem; line-height: 1; }
    .wx-temp  { font-size: 2.4rem; font-weight: 300; line-height: 1; }
    .wx-desc  { font-size: 0.95rem; color: var(--muted); line-height: 1.4; margin-top: 2px; }
    .wx-meta  { font-size: 0.72rem; color: var(--muted); opacity: 0.6; text-transform: uppercase; letter-spacing: 0.1em; margin-top: 2px; }

    .wx-range { display: flex; gap: 14px; align-items: center; margin-top: 6px; }
    .wx-high  { color: var(--amber); font-size: 1rem; font-weight: 500; }
    .wx-low   { color: var(--blue);  font-size: 1rem; }
    .wx-sep   { color: var(--muted); }

    .wx-wind { margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 3px; }
    .wx-wind-row { display: flex; align-items: baseline; gap: 6px; }
    .wx-wind-value { font-size: 1.1rem; font-weight: 300; color: var(--text); }
    .wx-wind-gust  { font-size: 1.1rem; font-weight: 500; color: var(--amber); }
    .wx-wind-label { font-size: 0.78rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
    .wx-wind-dir   { font-size: 0.85rem; color: var(--muted); margin-top: 1px; }

    /* Rainfall chart */
    .wx-rainfall {
      display: grid; grid-template-rows: auto 1fr auto;
      padding: 14px 20px 12px; gap: 8px; min-height: 0;
    }

    .wx-rainfall-header { display: flex; align-items: baseline; justify-content: space-between; }
    .wx-rainfall-title  { font-size: 0.85rem; font-weight: 500; text-transform: uppercase; letter-spacing: 0.12em; color: var(--muted); }
    .wx-total           { font-size: 1rem; color: var(--blue); font-weight: 500; }

    .rain-chart { display: flex; align-items: flex-end; gap: 8px; min-height: 0; }

    .rain-col { flex: 1; display: flex; flex-direction: column; align-items: center; height: 100%; }
    .rain-amount { font-size: 0.85rem; color: var(--blue); font-weight: 500; min-height: 1.2em; text-align: center; margin-bottom: 4px; }
    .rain-amount.zero { color: var(--muted); opacity: 0.4; }
    .rain-bar-area { flex: 1; width: 100%; display: flex; align-items: flex-end; }
    .rain-bar { width: 100%; background: var(--blue-dim); border-radius: 4px 4px 0 0; border: 1px solid var(--blue); border-bottom: none; transition: height 0.5s ease; }
    .rain-bar.has-rain  { background: var(--blue); }
    .rain-bar.zero-rain { background: transparent; border-color: transparent; height: 2px !important; border-radius: 0; }
    .rain-col.today .rain-bar.has-rain { background: var(--green); border-color: var(--green); }
    .rain-col.today .rain-amount       { color: var(--green); }
    .rain-col.today .rain-day-name     { color: var(--green); font-weight: 500; }

    .rain-axis  { width: 100%; height: 1px; background: var(--border); }
    .rain-labels { display: flex; gap: 8px; }
    .rain-label-col { flex: 1; text-align: center; }
    .rain-day-name  { font-size: 0.85rem; color: var(--text); }
    .rain-day-date  { font-size: 0.78rem; color: var(--muted); margin-top: 1px; }

    .empty { color: var(--muted); font-size: 1rem; padding: 20px; text-align: center; }
    .overdue-label { color: var(--red); }
    .due-label     { color: var(--amber); }
    .ok-label      { color: var(--muted); }
  </style>
  <script src="/static/theme.js?v=4"></script>
</head>
<body>

<header id="site-header"></header>

<main>
  <!-- Stats row -->
  <div class="stats-row">
    <a href="/plants" class="stat-card">
      <div class="stat-value" id="stat-plants">—</div>
      <div class="stat-label">Plants</div>
    </a>
    <a href="/tasks" class="stat-card">
      <div class="stat-value" id="stat-tasks">—</div>
      <div class="stat-label">Open tasks</div>
    </a>
    <a href="/seeds" class="stat-card">
      <div class="stat-value" id="stat-seeds">0</div>
      <div class="stat-label">Seeds in inventory</div>
    </a>
    <a href="/manage" class="stat-card">
      <div class="stat-value" id="stat-harvest">$0</div>
      <div class="stat-label">Total harvested</div>
    </a>
  </div>

  <!-- Tasks panel -->
  <div class="tasks-panel">
    <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 20px;border-bottom:1px solid var(--border);min-height:46px;gap:12px;">
      <span style="font-size:0.9rem;font-weight:500;text-transform:uppercase;letter-spacing:0.12em;color:var(--muted);">Tasks</span>
      <button id="dash-sync-btn" onclick="dashSyncPlanting()" style="background:var(--green-dim);border:none;border-radius:8px;color:#fff;font-family:'DM Sans',sans-serif;font-size:0.8rem;padding:5px 12px;cursor:pointer;transition:background 0.15s;" onmouseover="this.style.background='var(--green)'" onmouseout="this.style.background='var(--green-dim)'">🗓 Sync</button>
    </div>
    <div id="task-list">
      <div class="empty">Loading…</div>
    </div>
  </div>

  <!-- Weather panel -->
  <div class="weather-panel">
    <div class="wx-current">
      <div class="wx-icon" id="wx-icon">—</div>
      <div class="wx-temp" id="wx-temp">—°</div>
      <div class="wx-desc" id="wx-desc">Loading weather…</div>
      <div class="wx-range">
        <span class="wx-high" id="wx-high">—°</span>
        <span class="wx-sep">↕</span>
        <span class="wx-low" id="wx-low">—°</span>
      </div>
      <div class="wx-meta" id="wx-meta">KROG · 7-day range</div>
      <div class="wx-wind">
        <div class="wx-wind-row">
          <span class="wx-wind-value" id="wx-wind-speed">—</span>
          <span class="wx-wind-label">mph sustained</span>
        </div>
        <div class="wx-wind-row">
          <span class="wx-wind-gust" id="wx-wind-gust">—</span>
          <span class="wx-wind-label">mph gusts</span>
        </div>
        <div class="wx-wind-dir" id="wx-wind-dir">—</div>
      </div>
    </div>

    <div class="wx-rainfall">
      <div class="wx-rainfall-header">
        <span class="wx-rainfall-title">Rainfall — last 7 days (inches)</span>
        <span class="wx-total" id="wx-total">— in total</span>
      </div>
      <div class="rain-chart" id="rain-chart">
        <div class="empty">Loading…</div>
      </div>
      <div>
        <div class="rain-axis"></div>
        <div class="rain-labels" id="rain-labels"></div>
      </div>
    </div>
  </div>
</main>

<script>
  function wxIcon(desc) {
    if (!desc) return '🌡';
    const d = desc.toLowerCase();
    if (d.includes('thunder')) return '⛈';
    if (d.includes('snow'))    return '❄';
    if (d.includes('rain') || d.includes('drizzle')) return '🌧';
    if (d.includes('overcast') || d.includes('cloudy')) return '☁';
    if (d.includes('partly'))  return '⛅';
    if (d.includes('clear') || d.includes('sunny') || d.includes('fair')) return '☀';
    if (d.includes('fog') || d.includes('mist')) return '🌫';
    return '🌡';
  }

  const TASK_ICONS = {
    water:'💧', pests:'🐛', fertilize:'🌿', harvest:'🌽',
    sow_indoors:'🪴', sow_outdoors:'🌱', transplant:'⛏️',
  };

  function taskDueBadge(dueDate) {
    if (!dueDate) return { label: '', cls: '' };
    const days = Math.ceil((new Date(dueDate) - new Date()) / 864e5);
    if (days < 0)   return { label: 'Overdue',  cls: 'badge-overdue' };
    if (days === 0) return { label: 'Today',    cls: 'badge-today' };
    if (days === 1) return { label: 'Tomorrow', cls: 'badge-today' };
    return { label: `In ${days}d`, cls: 'badge-upcoming' };
  }

  function renderTaskList(tasks) {
    const cutoff = new Date();
    cutoff.setDate(cutoff.getDate() + 7);
    const visible = tasks.filter(t => !t.due_date || new Date(t.due_date + 'T12:00:00') <= cutoff).slice(0, 5);
    const list = document.getElementById('task-list');
    if (visible.length === 0) {
      list.innerHTML = '<div class="empty">Nothing due in the next 7 days 🎉</div>';
      return;
    }
    list.innerHTML = visible.map(t => {
      const badge = taskDueBadge(t.due_date);
      const icon  = TASK_ICONS[t.type] || '📋';
      const auto  = t.title === 'Water garden';
      return `<div class="task-row">
        <div class="task-check ${t.done ? 'done' : ''}" onclick="toggleTask(${t.id}, this)">${t.done ? '✓' : ''}</div>
        <span class="type-icon">${icon}</span>
        <div class="task-info">
          <div class="task-title">${t.title}</div>
          ${t.due_date ? `<div class="task-sub">Due ${new Date(t.due_date + 'T12:00:00').toLocaleDateString([], {month:'short', day:'numeric'})}</div>` : ''}
        </div>
        ${badge.label ? `<span class="task-badge ${badge.cls}">${badge.label}</span>` : ''}
        ${auto ? `<span class="task-badge badge-auto">auto</span>` : ''}
      </div>`;
    }).join('');
  }

  async function syncAndLoadTasks() {
    fetch('/api/tasks/sync', { method: 'POST' }).catch(() => {});
    fetch('/api/tasks/seed-plan-sync', { method: 'POST' }).catch(() => {});
    fetch('/api/tasks/schedule-sync', { method: 'POST' }).catch(() => {});
    const tasks = await fetch('/api/tasks').then(r => r.json());
    renderTaskList(tasks);
  }

  async function dashSyncPlanting() {
    const btn = document.getElementById('dash-sync-btn');
    const orig = btn.textContent;
    btn.disabled = true;
    btn.style.opacity = '0.6';
    btn.textContent = '⏳ Syncing…';
    try {
      await fetch('/api/tasks/seed-plan-sync', { method: 'POST' });
      btn.textContent = '✓ Done';
      setTimeout(() => { btn.textContent = orig; btn.disabled = false; btn.style.opacity = '1'; }, 2000);
    } catch (e) {
      btn.textContent = '✗ Failed';
      setTimeout(() => { btn.textContent = orig; btn.disabled = false; btn.style.opacity = '1'; }, 2000);
    }
    const tasks = await fetch('/api/tasks').then(r => r.json());
    renderTaskList(tasks);
  }

  async function toggleTask(id, el) {
    const nowDone = !el.classList.contains('done');
    el.classList.toggle('done', nowDone);
    el.textContent = nowDone ? '✓' : '';
    await fetch(`/api/tasks/${id}/done`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ done: nowDone })
    });
    setTimeout(syncAndLoadTasks, 400);
  }

  async function loadGardenData() {
    const [plants, tasks, seeds, harvests] = await Promise.all([
      fetch('/api/plants').then(r => r.json()),
      fetch('/api/tasks').then(r => r.json()),
      fetch('/api/seeds').then(r => r.json()),
      fetch('/api/harvests').then(r => r.json()),
    ]);
    const harvestTotal = harvests.reduce((sum, h) => sum + (h.value_usd || 0), 0);
    document.getElementById('stat-plants').textContent  = plants.length;
    document.getElementById('stat-tasks').textContent   = tasks.length;
    document.getElementById('stat-seeds').textContent   = seeds.length;
    document.getElementById('stat-harvest').textContent = '$' + harvestTotal.toFixed(2);
  }

  async function loadWeather() {
    try {
      const data = await fetch('/api/weather').then(r => r.json());
      const cur = data.current;
      document.getElementById('wx-temp').textContent       = cur.temp_f != null ? `${cur.temp_f}°F` : '—°';
      document.getElementById('wx-desc').textContent       = cur.description || '—';
      document.getElementById('wx-icon').textContent       = wxIcon(cur.description);
      document.getElementById('wx-wind-speed').textContent = cur.wind_speed_mph != null ? cur.wind_speed_mph : '—';
      document.getElementById('wx-wind-gust').textContent  = cur.wind_gust_mph  != null ? cur.wind_gust_mph  : '—';
      document.getElementById('wx-wind-dir').textContent   = cur.wind_dir ? `${cur.wind_dir} · ${Math.round(cur.wind_dir_deg)}°` : '—';
      if (data.temp_high != null) {
        document.getElementById('wx-high').textContent = `${data.temp_high.toFixed(0)}°`;
        document.getElementById('wx-low').textContent  = `${data.temp_low.toFixed(0)}°`;
      }

      const rainfall = data.rainfall;
      const todayStr = new Date().toLocaleDateString('en-CA');
      const maxIn    = Math.max(...rainfall.map(r => r.inches), 0.01);
      const totalIn  = rainfall.reduce((s, r) => s + r.inches, 0);
      document.getElementById('wx-total').textContent = `${totalIn.toFixed(2)}" total`;

      document.getElementById('rain-chart').innerHTML = rainfall.map(r => {
        const isToday = r.date === todayStr;
        const hasRain = r.inches >= 0.005;
        const pct     = hasRain ? Math.max((r.inches / maxIn) * 100, 4) : 0;
        return `<div class="rain-col${isToday ? ' today' : ''}">
          <div class="rain-amount${hasRain ? '' : ' zero'}">${hasRain ? r.inches.toFixed(2)+'"' : '—'}</div>
          <div class="rain-bar-area">
            <div class="rain-bar ${hasRain ? 'has-rain' : 'zero-rain'}" style="height:${pct}%"></div>
          </div>
        </div>`;
      }).join('');

      document.getElementById('rain-labels').innerHTML = rainfall.map(r => {
        const isToday = r.date === todayStr;
        const d = new Date(r.date + 'T12:00:00');
        return `<div class="rain-label-col">
          <div class="rain-day-name">${isToday ? 'Today' : d.toLocaleDateString([], {weekday:'short'})}</div>
          <div class="rain-day-date">${d.toLocaleDateString([], {month:'numeric', day:'numeric'})}</div>
        </div>`;
      }).join('');
    } catch (e) {
      document.getElementById('wx-desc').textContent = 'Weather unavailable';
    }
  }

  loadGardenData();
  loadWeather();
  syncAndLoadTasks();
  setInterval(loadGardenData, 60000);
  setInterval(loadWeather, 1800000);
  setInterval(syncAndLoadTasks, 21600000);

  (function scheduleDailyReload() {
    const now = new Date();
    const next3am = new Date(now);
    next3am.setHours(3, 0, 0, 0);
    if (next3am <= now) next3am.setDate(next3am.getDate() + 1);
    setTimeout(() => location.reload(), next3am - now);
  })();
</script>
</body>
</html>
