<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Root Cause Analysis — Tasks</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="/static/theme.js?v=4"></script>
  <style>
    
    
    

    main {
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 16px;
      padding: 16px 28px;
      overflow: hidden;
    }

    .toggle-done {
      font-size: 0.7rem;
      color: var(--muted);
      cursor: pointer;
      background: none;
      border: none;
      font-family: inherit;
      padding: 0;
    }
    .toggle-done:hover { color: var(--text); }

    #task-list { overflow-y: auto; flex: 1; }

    .task-row {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      min-height: 56px;
      transition: background 0.15s;
    }
    .task-row:last-child { border-bottom: none; }
    .task-row.is-done { opacity: 0.45; }

    .task-check {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      border: 1.5px solid var(--border);
      background: var(--bg);
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      transition: background 0.15s, border-color 0.15s;
    }
    .task-check:hover { border-color: var(--green-dim); }
    .task-check.done  { background: var(--green-dim); border-color: var(--green-dim); color: #fff; }

    .type-icon { font-size: 1.3rem; flex-shrink: 0; }

    .task-info { flex: 1; min-width: 0; }
    .task-title { font-size: 1.1rem; font-weight: 500; }
    .task-notes { font-size: 0.85rem; color: var(--muted); margin-top: 3px; line-height: 1.4; }
    .task-done-at { font-size: 0.78rem; color: var(--muted); margin-top: 2px; font-style: italic; }

    .task-badges { display: flex; gap: 6px; flex-shrink: 0; align-items: center; }
    .badge {
      font-size: 0.78rem;
      font-weight: 500;
      padding: 5px 12px;
      border-radius: 99px;
    }
    .badge-overdue  { background: var(--red);       color: #fff; }
    .badge-today    { background: var(--amber);     color: #fff; }
    .badge-upcoming { background: var(--border);    color: var(--muted); }
    .badge-auto     { background: var(--green-dim); color: #fff; }

    .task-delete {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 1rem;
      padding: 4px;
      opacity: 0;
      transition: opacity 0.15s, color 0.15s;
      flex-shrink: 0;
    }
    .task-row:hover .task-delete { opacity: 1; }
    .task-delete:hover { color: var(--red); }

    /* Add task form */
    .add-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      align-self: start;
    }
    .add-body { padding: 18px; display: flex; flex-direction: column; gap: 14px; }

    .btn-add {
      background: var(--green-dim);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 500;
      padding: 14px;
      cursor: pointer;
      width: 100%;
      transition: background 0.15s;
    }
    .btn-add:hover  { background: var(--green); }
    .btn-add:active { transform: scale(0.97); }

    .task-tab {
      padding: 12px 22px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--muted);
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
      margin-bottom: -1px;
    }
    .task-tab:hover { color: var(--text); }
    .task-tab-active { color: var(--green) !important; border-bottom-color: var(--green) !important; }

    .sync-section {
      border-top: 1px solid var(--border);
      padding-top: 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .sync-section label {
      font-size: 0.72rem;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .btn-sync {
      background: var(--green-dim);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 500;
      padding: 12px;
      cursor: pointer;
      width: 100%;
      transition: background 0.15s;
      text-align: center;
    }
    .btn-sync:hover  { background: var(--green); }
    .btn-sync:active { transform: scale(0.97); }
    .btn-sync:disabled { opacity: 0.6; cursor: default; }
    .sync-status { font-size: 0.8rem; color: var(--muted); min-height: 1.2em; }

  
        
    
    
    
    
    

  </style>
  

<body>

<header id="site-header"></header>

<main>
  <!-- Task list -->
  <div class="panel">
    <div class="panel-header" style="padding:0;border-bottom:1px solid var(--border);">
      <div style="display:flex;gap:0;">
        <button id="tab-open" class="task-tab task-tab-active" onclick="setTab('open')">Open tasks</button>
        <button id="tab-done" class="task-tab" onclick="setTab('done')">Completed</button>
      </div>
    </div>
    <div id="task-list">
      <div class="empty">Loading…</div>
    </div>
  </div>

  <!-- Add task -->
  <div class="add-panel">
    <div class="panel-header"><h2>Add task</h2></div>
    <div class="add-body">
      <div class="field">
        <label>Type</label>
        <select id="new-type">
          <option value="water">💧 Water plants</option>
          <option value="pests">🐛 Check for pests</option>
          <option value="fertilize">🌿 Fertilize</option>
          <option value="harvest">🌽 Harvest</option>
          <option value="sow_indoors">🪴 Sow indoors</option>
          <option value="sow_outdoors">🌱 Sow outdoors</option>
          <option value="transplant">⛏️ Transplant</option>
        </select>
      </div>
      <div class="field">
        <label>Title</label>
        <input type="text" id="new-title" placeholder="e.g. Fertilize tomatoes">
      </div>
      <div class="field">
        <label>Due date</label>
        <input type="date" id="new-due">
      </div>
      <div class="field">
        <label>Notes</label>
        <textarea id="new-notes" placeholder="Optional notes…"></textarea>
      </div>
      <button class="btn-add" onclick="addTask()">Add task</button>

      <div class="sync-section">
        <label>Planting tasks</label>
        <button class="btn-sync" id="sync-btn" onclick="syncPlantingTasks()">🗓 Sync planting tasks</button>
        <div class="sync-status" id="sync-status"></div>
      </div>
    </div>
  </div>
</main>

<script>
  const TASK_ICONS = {
    water:       '💧',
    pests:       '🐛',
    fertilize:   '🌿',
    harvest:     '🌽',
    sow_indoors: '🪴',
    sow_outdoors:'🌱',
    transplant:  '⛏️',
  };

  let showDone = false;

  function taskDueBadge(dueDate, done) {
    if (done || !dueDate) return null;
    const days = Math.ceil((new Date(dueDate) - new Date()) / 864e5);
    if (days < 0)  return { label: 'Overdue',  cls: 'badge-overdue' };
    if (days === 0) return { label: 'Today',    cls: 'badge-today' };
    if (days === 1) return { label: 'Tomorrow', cls: 'badge-today' };
    return { label: `In ${days}d`, cls: 'badge-upcoming' };
  }

  function formatDate(str) {
    if (!str) return '';
    const d = str.includes('T') ? new Date(str) : new Date(str + 'T12:00:00');
    return d.toLocaleDateString([], { month: 'short', day: 'numeric', year: 'numeric' });
  }

  async function loadTasks() {
    const url = showDone ? '/api/tasks?done_only=true' : '/api/tasks';
    const tasks = await fetch(url).then(r => r.json());
    const list = document.getElementById('task-list');

    if (tasks.length === 0) {
      list.innerHTML = '<div class="empty">' + (showDone ? 'No completed tasks yet.' : 'No open tasks 🎉') + '</div>';
      return;
    }

    list.innerHTML = tasks.map(t => {
      const badge = taskDueBadge(t.due_date, t.done);
      const icon  = TASK_ICONS[t.type] || '📋';
      const auto  = t.title === 'Water garden' || (t.notes || '').startsWith('Auto-generated');
      return `<div class="task-row ${t.done ? 'is-done' : ''}">
        <div class="task-check ${t.done ? 'done' : ''}" onclick="toggleTask(${t.id}, this)">
          ${t.done ? '✓' : ''}
        </div>
        <span class="type-icon">${icon}</span>
        <div class="task-info">
          <div class="task-title">${t.title}</div>
          ${t.due_date ? `<div class="task-notes">Due ${formatDate(t.due_date)}</div>` : ''}
          ${t.notes ? `<div class="task-notes">${t.notes}</div>` : ''}
          ${t.done && t.done_at ? `<div class="task-done-at">Completed ${formatDate(t.done_at)}</div>` : ''}
        </div>
        <div class="task-badges">
          ${badge ? `<span class="badge ${badge.cls}">${badge.label}</span>` : ''}
          ${auto  ? `<span class="badge badge-auto">auto</span>` : ''}
        </div>
        <button class="task-delete" onclick="deleteTask(${t.id})" title="Delete">✕</button>
      </div>`;
    }).join('');
  }

  async function toggleTask(id, el) {
    const nowDone = !el.classList.contains('done');
    await fetch(`/api/tasks/${id}/done`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ done: nowDone })
    });
    loadTasks();
  }

  async function deleteTask(id) {
    await fetch(`/api/tasks/${id}`, { method: 'DELETE' });
    loadTasks();
  }

  async function addTask() {
    const type  = document.getElementById('new-type').value;
    const title = document.getElementById('new-title').value.trim();
    const due   = document.getElementById('new-due').value || null;
    const notes = document.getElementById('new-notes').value.trim() || null;

    if (!title) {
      document.getElementById('new-title').focus();
      return;
    }

    await fetch('/api/tasks', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ type, title, due_date: due, notes })
    });

    document.getElementById('new-title').value = '';
    document.getElementById('new-due').value   = '';
    document.getElementById('new-notes').value = '';
    loadTasks();
  }

  function setTab(tab) {
    showDone = tab === 'done';
    document.getElementById('tab-open').classList.toggle('task-tab-active', !showDone);
    document.getElementById('tab-done').classList.toggle('task-tab-active', showDone);
    loadTasks();
  }

  async function syncPlantingTasks() {
    const btn    = document.getElementById('sync-btn');
    const status = document.getElementById('sync-status');
    btn.disabled = true;
    btn.textContent = '⏳ Syncing…';
    status.textContent = '';
    try {
      const result = await fetch('/api/tasks/seed-plan-sync', { method: 'POST' }).then(r => r.json());
      if (result.message) {
        status.textContent = '⚠ ' + result.message;
        status.style.color = 'var(--amber)';
      } else {
        const parts = [];
        if (result.created) parts.push(`${result.created} created`);
        if (result.updated) parts.push(`${result.updated} updated`);
        if (result.closed)  parts.push(`${result.closed} closed`);
        status.textContent = parts.length ? '✓ ' + parts.join(' · ') : '✓ Up to date';
        status.style.color = 'var(--green)';
      }
    } catch(e) {
      status.textContent = '✗ Sync failed';
      status.style.color = 'var(--red)';
    }
    btn.disabled = false;
    btn.textContent = '🗓 Sync planting tasks';
    loadTasks();
  }

  // Sync weather + planting + schedule tasks on load
  fetch('/api/tasks/sync', { method: 'POST' }).catch(() => {});
  fetch('/api/tasks/schedule-sync', { method: 'POST' }).catch(() => {});
  syncPlantingTasks();
</script>
</body>
</html>
