<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Root Cause Analysis — Manage</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="/static/theme.js?v=4"></script>
  <style>
    

    
    

        
    
    
    
    
    

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: grid;
      grid-template-rows: auto 1fr;
      overflow: hidden;
    }

    .content-wrap {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .tab-bar {
      display: flex;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
      scrollbar-width: none;
      flex-shrink: 0;
    }
    .tab-bar::-webkit-scrollbar { display: none; }

    .main {
      flex: 1;
      padding: 24px 28px;
      overflow-y: auto;
      background: var(--bg);
      scrollbar-width: none;
    }
    .main::-webkit-scrollbar { display: none; }

    /* Page header */
    .page-header {
      margin-bottom: 24px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
    }
    .page-title {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      font-weight: 500;
      color: var(--green);
    }
    .page-subtitle {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 4px;
    }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      background: transparent;
      border: 1px solid var(--border2);
      color: var(--green);
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      border-radius: 8px;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.15s;
    }
    .btn:hover { background: var(--dim); border-color: var(--green); color: var(--text); }
    .btn-primary { background: var(--green-dim); border-color: var(--green-dim); color: #fff; }
    .btn-primary:hover { background: var(--green); border-color: var(--green); }
    .btn-danger { border-color: var(--red); color: var(--red); }
    .btn-danger:hover { background: rgba(138,58,42,0.1); }
    .btn-sm { padding: 6px 14px; font-size: 0.85rem; }

    /* Panel */
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 16px;
    }
    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 18px;
      border-bottom: 1px solid var(--border);
    }
    .panel-title {
      font-size: 0.8rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 500;
    }

    /* Form */
    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 12px;
      padding: 16px 18px;
    }
    .form-group { display: flex; flex-direction: column; gap: 5px; }
    .form-group.span2 { grid-column: span 2; }
    .form-group.span3 { grid-column: 1 / -1; }

    label {
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 500;
    }

    input, select, textarea {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem;
      padding: 8px 10px;
      border-radius: 8px;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus, select:focus, textarea:focus { border-color: var(--green-dim); }
    select option { background: var(--bg2); }
    textarea { resize: vertical; min-height: 64px; }

    .form-actions { display: flex; gap: 10px; padding: 0 18px 16px; }

    /* Table */
    .tbl { width: 100%; border-collapse: collapse; }
    .tbl th {
      text-align: left;
      padding: 10px 18px;
      font-size: 0.78rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      background: var(--bg2);
    }
    .tbl td { padding: 12px 18px; border-bottom: 1px solid var(--border); vertical-align: middle; font-size: 0.85rem; }
    .tbl tr:last-child td { border-bottom: none; }
    .tbl tr:hover td { background: var(--dim); }
    .tbl-actions { display: flex; gap: 6px; }

    .empty { padding: 32px 18px; text-align: center; color: var(--muted); font-size: 0.82rem; }
    .loading { color: var(--muted); font-size: 0.82rem; padding: 20px 18px; }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--surface);
      border: 1px solid var(--green-dim);
      color: var(--green);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      padding: 10px 18px;
      border-radius: 10px;
      opacity: 0;
      transform: translateY(8px);
      transition: all 0.2s;
      pointer-events: none;
      z-index: 999;
    }
    #toast.show { opacity: 1; transform: translateY(0); }

    /* Confirm dialog */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 900;
    }
    .dialog {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 14px;
      padding: 28px 32px;
      max-width: 360px;
      width: 90%;
    }
    .dialog h3 {
      font-family: 'Playfair Display', serif;
      color: var(--green);
      margin-bottom: 10px;
      font-size: 1.2rem;
      font-weight: 500;
    }
    .dialog p { color: var(--text2); font-size: 0.85rem; margin-bottom: 20px; line-height: 1.5; }
    .dialog-actions { display: flex; gap: 10px; }

  </style>

<body>

<header id="site-header"></header>

<div class="content-wrap">
  <nav class="tab-bar">
    <button class="tab active" id="tab-zones"      onclick="showSection('zones')">◫ Zones</button>
    <button class="tab" id="tab-beds"              onclick="showSection('beds')">⊟ Beds</button>
    <button class="tab" id="tab-containers"        onclick="showSection('containers')">◻ Containers</button>
    <button class="tab" id="tab-crops"             onclick="showSection('crops')">🫘 Crops</button>
    <button class="tab" id="tab-schedules"         onclick="showSection('schedules')">⏱ Schedules</button>
    <button class="tab" id="tab-journal"           onclick="showSection('journal')">📓 Journal</button>
    <button class="tab" id="tab-harvest"           onclick="showSection('harvest')">🌾 Harvest</button>
    <button class="tab" id="tab-expenses"          onclick="showSection('expenses')">💸 Expenses</button>
    <button class="tab" id="tab-sources"           onclick="showSection('sources')">🏷 Seed Sources</button>
  </nav>
  <main class="main" id="main-content"></main>
</div>

<div id="toast"></div>
<div id="overlay-root"></div>

<script>
function toast(msg, isErr) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.borderColor = isErr ? 'var(--red)' : 'var(--green-dim)';
  t.style.color = isErr ? 'var(--red)' : 'var(--green)';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

function confirm(title, msg) {
  return new Promise(resolve => {
    const root = document.getElementById('overlay-root');
    root.innerHTML = `
      <div class="overlay" onclick="if(event.target===this){closeDialog(false)}">
        <div class="dialog">
          <h3>${title}</h3>
          <p>${msg}</p>
          <div class="dialog-actions">
            <button class="btn" style="opacity:1;color:var(--red);border:1px solid var(--red);border-radius:8px;padding:10px 20px;font-size:0.95rem;" onclick="closeDialog(true)">Delete</button>
            <button class="btn" onclick="closeDialog(false)">Cancel</button>
          </div>
        </div>
      </div>`;
    window._dialogResolve = resolve;
  });
}
function closeDialog(v) {
  document.getElementById('overlay-root').innerHTML = '';
  window._dialogResolve?.(v);
}

async function api(path, opts) {
  try {
    const r = await fetch(path, opts);
    if (!r.ok) throw new Error(await r.text());
    if (r.status === 204) return null;
    return r.json();
  } catch(e) {
    toast('Error: ' + e.message, true);
    throw e;
  }
}

function showSection(s) {
  document.querySelectorAll('.tab-bar .tab').forEach(el => el.classList.remove('active'));
  const tab = document.getElementById('tab-' + s);
  if (tab) tab.classList.add('active');
  location.hash = s;
  ({ zones, beds, containers, schedules, journal, crops, harvest, expenses, sources }[s] || zones)();
}

const VALID_TABS = ['zones','beds','containers','crops','schedules','journal','harvest','expenses','sources'];
const initTab = VALID_TABS.includes(location.hash.slice(1)) ? location.hash.slice(1) : 'zones';
showSection(initTab);

function fmtDate(s) {
  if (!s) return '—';
  // Normalize SQLite datetime (space separator) and date-only strings
  const iso = s.includes('T') ? s : s.includes(' ') ? s.replace(' ', 'T') : s + 'T12:00:00';
  const d = new Date(iso);
  if (isNaN(d)) return s;
  return d.toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'});
}

// ════════════════════════
// ZONES
// ════════════════════════
async function zones() {
  const main = document.getElementById('main-content');
  main.innerHTML = '<div class="loading">Loading…</div>';
  const data = await api('/api/zones');
  main.innerHTML = `
    <div class="page-header">
      <div><div class="page-title">Zones</div><div class="page-subtitle">Garden areas and sections</div></div>
    </div>
    <div class="panel">
      <div class="panel-head"><span class="panel-title">Add zone</span></div>
      <div class="form-grid">
        <div class="form-group span2"><label>Name *</label><input id="z-name" placeholder="e.g. Front yard"></div>
        <div class="form-group span2"><label>Notes</label><input id="z-notes" placeholder="Optional notes"></div>
      </div>
      <div class="form-actions"><button class="btn btn-primary" onclick="createZone()">Add zone</button></div>
    </div>
    <div class="panel">
      <div class="panel-head"><span class="panel-title">${data.length} zones</span></div>
      ${zonesTable(data)}
    </div>`;
}

function zonesTable(data) {
  if (!data.length) return '<div class="empty">No zones yet</div>';
  return `<table class="tbl">
    <thead><tr><th>Name</th><th>Notes</th><th></th></tr></thead>
    <tbody>${data.map(z=>{window.__zones=window.__zones||{};window.__zones[z.id]=z;return`<tr>
      <td>${z.name}</td>
      <td style="color:var(--text2)">${z.notes||''}</td>
      <td style="display:flex;gap:6px;">
        <button class="btn btn-sm" onclick="editZone(window.__zones[${z.id}])">Edit</button>
        <button class="btn btn-sm btn-danger" style="opacity:1;" onclick="deleteZone(${z.id},'${z.name}')">Delete</button>
      </td>
    </tr>`;}).join('')}</tbody></table>`;
}

async function createZone() {
  const name = document.getElementById('z-name').value.trim();
  const notes = document.getElementById('z-notes').value.trim();
  if (!name) { toast('Name required', true); return; }
  await api('/api/zones', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({name, notes:notes||null})});
  toast('Zone added'); zones();
}

async function deleteZone(id, name) {
  if (!await confirm('Delete zone', `Delete "${name}"? Beds in this zone will be unlinked.`)) return;
  await api(`/api/zones/${id}`, {method:'DELETE'});
  toast('Zone deleted'); zones();
}

function editZone(z) {
  document.getElementById('overlay-root').innerHTML = `
    <div class="overlay" onclick="if(event.target===this){closeDialog(false)}">
      <div class="dialog" style="max-width:400px;width:90%;">
        <h3>Edit zone</h3>
        <div class="form-grid" style="padding:16px 0 12px;grid-template-columns:1fr;">
          <div class="form-group"><label>Name *</label><input id="ez-name" value="${z.name||''}"></div>
          <div class="form-group"><label>Notes</label><input id="ez-notes" value="${z.notes||''}"></div>
        </div>
        <div class="dialog-actions">
          <button class="btn btn-primary" onclick="saveZone(${z.id})">Save</button>
          <button class="btn" onclick="closeDialog(false)">Cancel</button>
        </div>
      </div>
    </div>`;
}

async function saveZone(id) {
  const name = document.getElementById('ez-name').value.trim();
  if (!name) { toast('Name required', true); return; }
  await api(`/api/zones/${id}`, {method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({name, notes:document.getElementById('ez-notes').value.trim()||null})});
  closeDialog(false); toast('Zone updated'); zones();
}

// ════════════════════════
// BEDS
// ════════════════════════
async function beds() {
  const main = document.getElementById('main-content');
  main.innerHTML = '<div class="loading">Loading…</div>';
  const [data, zoneList] = await Promise.all([api('/api/beds'), api('/api/zones')]);
  const zoneOptions = `<option value="">No zone</option>` + zoneList.map(z=>`<option value="${z.id}">${z.name}</option>`).join('');
  main.innerHTML = `
    <div class="page-header">
      <div><div class="page-title">Beds</div><div class="page-subtitle">Garden bed grid layout</div></div>
    </div>
    <div class="panel">
      <div class="panel-head"><span class="panel-title">Add bed</span></div>
      <div class="form-grid">
        <div class="form-group"><label>Name *</label><input id="b-name" placeholder="e.g. Raised bed A"></div>
        <div class="form-group"><label>Zone</label><select id="b-zone">${zoneOptions}</select></div>
        <div class="form-group"><label>Rows</label><input id="b-rows" type="number" min="1" value="4"></div>
        <div class="form-group"><label>Cols</label><input id="b-cols" type="number" min="1" value="4"></div>
        <div class="form-group span2"><label>Notes</label><input id="b-notes" placeholder="Optional"></div>
      </div>
      <div class="form-actions"><button class="btn btn-primary" onclick="createBed()">Add bed</button></div>
    </div>
    <div class="panel">
      <div class="panel-head"><span class="panel-title">${data.length} beds</span></div>
      ${bedsTable(data)}
    </div>`;
}

function bedsTable(data) {
  if (!data.length) return '<div class="empty">No beds yet</div>';
  return `<table class="tbl">
    <thead><tr><th>Name</th><th>Zone</th><th>Grid</th><th>Notes</th><th></th></tr></thead>
    <tbody>${data.map(b=>{window.__beds=window.__beds||{};window.__beds[b.id]=b;return`<tr>
      <td>${b.name}</td>
      <td>${b.zone_name||'—'}</td>
      <td style="color:var(--muted)">${b.rows}×${b.cols}</td>
      <td style="color:var(--text2)">${b.notes||''}</td>
      <td style="display:flex;gap:6px;">
        <button class="btn btn-sm" onclick="editBed(window.__beds[${b.id}])">Edit</button>
        <button class="btn btn-sm btn-danger" style="opacity:1;" onclick="deleteBed(${b.id},'${b.name}')">Delete</button>
      </td>
    </tr>`;}).join('')}</tbody></table>`;
}

async function createBed() {
  const name = document.getElementById('b-name').value.trim();
  const zone_id = parseInt(document.getElementById('b-zone').value)||null;
  const rows = parseInt(document.getElementById('b-rows').value);
  const cols = parseInt(document.getElementById('b-cols').value);
  const notes = document.getElementById('b-notes').value.trim();
  if (!name || !rows || !cols) { toast('Name, rows and cols required', true); return; }
  await api('/api/beds', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({name, zone_id, rows, cols, notes:notes||null})});
  toast('Bed added'); beds();
}

async function deleteBed(id, name) {
  if (!await confirm('Delete bed', `Delete "${name}"? Plants in this bed will be unlinked.`)) return;
  await api(`/api/beds/${id}`, {method:'DELETE'});
  toast('Bed deleted'); beds();
}

async function editBed(b) {
  const zones = await api('/api/zones');
  const zoneOpts = '<option value="">No zone</option>' + zones.map(z=>`<option value="${z.id}" ${z.id==b.zone_id?'selected':''}>${z.name}</option>`).join('');
  document.getElementById('overlay-root').innerHTML = `
    <div class="overlay" onclick="if(event.target===this){closeDialog(false)}">
      <div class="dialog" style="max-width:480px;width:90%;">
        <h3>Edit bed</h3>
        <div class="form-grid" style="padding:16px 0 12px;grid-template-columns:1fr 1fr;">
          <div class="form-group"><label>Name *</label><input id="eb-name" value="${b.name||''}"></div>
          <div class="form-group"><label>Zone</label><select id="eb-zone">${zoneOpts}</select></div>
          <div class="form-group"><label>Rows</label><input id="eb-rows" type="number" min="1" value="${b.rows||''}"></div>
          <div class="form-group"><label>Cols</label><input id="eb-cols" type="number" min="1" value="${b.cols||''}"></div>
          <div class="form-group span2"><label>Notes</label><input id="eb-notes" value="${b.notes||''}"></div>
        </div>
        <div class="dialog-actions">
          <button class="btn btn-primary" onclick="saveBed(${b.id})">Save</button>
          <button class="btn" onclick="closeDialog(false)">Cancel</button>
        </div>
      </div>
    </div>`;
}

async function saveBed(id) {
  const name = document.getElementById('eb-name').value.trim();
  const rows = parseInt(document.getElementById('eb-rows').value);
  const cols = parseInt(document.getElementById('eb-cols').value);
  if (!name || !rows || !cols) { toast('Name, rows and cols required', true); return; }
  const body = {name, zone_id:parseInt(document.getElementById('eb-zone').value)||null, rows, cols, notes:document.getElementById('eb-notes').value.trim()||null};
  await api(`/api/beds/${id}`, {method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)});
  closeDialog(false); toast('Bed updated'); beds();
}

// ════════════════════════
// CONTAINERS
// ════════════════════════
async function containers() {
  const main = document.getElementById('main-content');
  main.innerHTML = '<div class="loading">Loading…</div>';
  const data = await api('/api/containers');
  const zones = await api('/api/zones');
  const zoneOpts = zones.map(z => `<option value="${z.id}">${z.name}</option>`).join('');
  main.innerHTML = `
    <div class="page-header">
      <div><div class="page-title">Containers</div><div class="page-subtitle">Pots, planters, grow bags</div></div>
    </div>
    <div class="panel">
      <div class="panel-head"><span class="panel-title">Add container</span></div>
      <div class="form-grid">
        <div class="form-group"><label>Zone</label><select id="c-zone"><option value="">No zone</option></select></div>
        <div class="form-group"><label>Name *</label><input id="c-name" placeholder="e.g. Big terracotta pot"></div>
        <div class="form-group"><label>Type</label><input id="c-type" placeholder="pot / bag / box"></div>
        <div class="form-group"><label>Size (gallons)</label><input id="c-size" type="number" step="0.5" placeholder="e.g. 5"></div>
        <div class="form-group"><label>Location</label><input id="c-location" placeholder="e.g. Front patio, Greenhouse"></div>
        <div class="form-group"><label>Notes</label><input id="c-notes" placeholder="Optional"></div>
      </div>
      <div class="form-actions"><button class="btn btn-primary" onclick="createContainer()">Add container</button></div>
    </div>
    <div class="panel">
      <div class="panel-head"><span class="panel-title">${data.length} containers</span></div>
      ${containersTable(data)}
    </div>`;
  document.getElementById('c-zone').innerHTML = '<option value="">No zone</option>' + zoneOpts;
}

function containersTable(data) {
  if (!data.length) return '<div class="empty">No containers yet</div>';
  return `<table class="tbl">
    <thead><tr><th>Zone</th><th>Name</th><th>Type</th><th>Size (gal)</th><th>Location</th><th>Notes</th><th></th></tr></thead>
    <tbody>${data.map((c,i)=>{window.__containers=window.__containers||{}; window.__containers[c.id]=c; return `<tr>
      <td style="color:var(--text2)">${c.zone_name||'—'}</td>
      <td>${c.name}</td>
      <td>${c.type||'—'}</td>
      <td>${c.size_gallons||'—'}</td>
      <td style="color:var(--text2)">${c.location||'—'}</td>
      <td style="color:var(--text2)">${c.notes||''}</td>
      <td style="display:flex;gap:6px;">
        <button class="btn btn-sm" onclick="editContainer(window.__containers[${c.id}])">Edit</button>
        <button class="btn btn-sm btn-danger" style="opacity:1;" onclick="deleteContainer(${c.id},'${c.name}')">Delete</button>
      </td>
    </tr>`; }).join('')}</tbody></table>`;
}

async function createContainer() {
  const name = document.getElementById('c-name').value.trim();
  const type = document.getElementById('c-type').value.trim();
  const zone_id = parseInt(document.getElementById('c-zone').value)||null;
  const size_gallons = parseFloat(document.getElementById('c-size').value)||null;
  const location = document.getElementById('c-location').value.trim();
  const notes = document.getElementById('c-notes').value.trim();
  if (!name) { toast('Name required', true); return; }
  await api('/api/containers', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({zone_id, name, type:type||null, size_gallons, location:location||null, notes:notes||null})});
  toast('Container added'); containers();
}

async function deleteContainer(id, name) {
  if (!await confirm('Delete container', `Delete "${name}"? Plants will be unlinked.`)) return;
  await api(`/api/containers/${id}`, {method:'DELETE'});
  toast('Container deleted'); containers();
}

async function editContainer(c) {
  const zones = await api('/api/zones');
  const zoneOpts = '<option value="">No zone</option>' + zones.map(z =>
    `<option value="${z.id}" ${z.id == c.zone_id ? 'selected' : ''}>${z.name}</option>`
  ).join('');
  const root = document.getElementById('overlay-root');
  root.innerHTML = `
    <div class="overlay" onclick="if(event.target===this){closeDialog(false)}">
      <div class="dialog" style="min-width:340px;">
        <h3>Edit container</h3>
        <div class="form-grid" style="margin-bottom:12px;">
          <div class="form-group"><label>Zone</label><select id="ec-zone">${zoneOpts}</select></div>
          <div class="form-group"><label>Name *</label><input id="ec-name" value="${c.name||''}"></div>

function schedulesTable(data) {

async function createSchedule() {
  const plant_id = parseInt(document.getElementById('s-plant').value);

async function deleteSchedule(id, name) {

async function saveSchedule(id) {

        <td style="color:var(--muted)">${h.price_per_lb != null ? '$' + h.price_per_lb.toFixed(2) : '—'}</td>
        <td style="color:var(--green);font-weight:500">${value}</td>
        <td style="color:var(--muted)">${fmtDate(h.harvest_date)}</td>
        <td style="color:var(--text2)">${h.notes || ''}</td>
        <td style="display:flex;gap:6px;">
          <button class="btn btn-sm" onclick="editHarvest(window.__harvests[${h.id}])">Edit</button>
          <button class="btn btn-sm btn-danger" style="opacity:1;" onclick="deleteHarvest(${h.id})">Delete</button>
        </td>
      </tr>`;
    }).join('')}</tbody></table>`;
}

async function createHarvest() {
  const sel = document.getElementById('h-crop');
  const fullText = sel.options[sel.selectedIndex]?.text || '';
  if (!fullText || fullText === 'Select crop…') { toast('Crop required', true); return; }
  const parts = fullText.split(' — ');
  const crop_name = parts[0].trim();
  const variety = parts[1]?.trim() || null;
  const crop_id = parseInt(sel.value) || null;
  const weight = parseFloat(document.getElementById('h-weight').value);
  if (!weight) { toast('Weight required', true); return; }
  const body = {
    crop_id, crop_name, variety, weight,
    unit:         document.getElementById('h-unit').value,
    price_per_lb: parseFloat(document.getElementById('h-price').value) || null,
    harvest_date: document.getElementById('h-date').value || null,
    notes:        document.getElementById('h-notes').value.trim() || null,
  };
  await api('/api/harvests', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)});
  toast('Harvest logged'); harvest();
}

async function editHarvest(h) {
  const plants = await api('/api/plants');
  const matchingVarieties = [...new Set(
    plants
      .filter(p => p.name.toLowerCase() === h.crop_name.toLowerCase() && p.variety)
      .map(p => p.variety)
  )];
  const varietyField = matchingVarieties.length
    ? `<select id="eh-variety">
        <option value="">— none —</option>
        ${matchingVarieties.map(v => `<option value="${v}" ${v===h.variety?'selected':''}>${v}</option>`).join('')}
       </select>`
    : `<input id="eh-variety" value="${(h.variety||'').replace(/"/g,'&quot;')}" placeholder="Optional">`;

  const units = ['oz','lb','g','kg'];
  const unitOpts = units.map(u => `<option value="${u}" ${u===h.unit?'selected':''}>${u}</option>`).join('');
  document.getElementById('overlay-root').innerHTML = `
    <div class="overlay" onclick="if(event.target===this){closeDialog(false)}">
      <div class="dialog" style="max-width:520px;width:90%;">
        <h3>Edit harvest — ${h.crop_name}${h.variety ? ' — ' + h.variety : ''}</h3>
        <div class="form-grid" style="padding:16px 0 12px;grid-template-columns:1fr 1fr;">
          <div class="form-group"><label>Crop</label><input id="eh-crop-name" value="${(h.crop_name||'').replace(/"/g,'&quot;')}"></div>
          <div class="form-group"><label>Variety</label>${varietyField}</div>
          <div class="form-group"><label>Weight *</label><input id="eh-weight" type="number" step="0.01" min="0" value="${h.weight||''}"></div>
          <div class="form-group"><label>Unit</label><select id="eh-unit">${unitOpts}</select></div>
          <div class="form-group"><label>Price / lb ($)</label><input id="eh-price" type="number" step="0.01" min="0" value="${h.price_per_lb||''}"></div>
          <div class="form-group"><label>Date</label><input id="eh-date" type="date" value="${h.harvest_date||''}"></div>
          <div class="form-group span2"><label>Notes</label><input id="eh-notes" value="${(h.notes||'').replace(/"/g,'&quot;')}"></div>
        </div>
        <div class="dialog-actions">
          <button class="btn btn-primary" onclick="saveHarvest(${h.id})">Save</button>
          <button class="btn" onclick="closeDialog(false)">Cancel</button>
        </div>
      </div>
    </div>`;
}

async function saveHarvest(id) {
  const h = window.__harvests[id];
  const weight = parseFloat(document.getElementById('eh-weight').value);
  if (!weight) { toast('Weight required', true); return; }
  const body = {
    crop_id:      h.crop_id,
    crop_name:    document.getElementById('eh-crop-name').value.trim() || h.crop_name,
    variety:      document.getElementById('eh-variety').value.trim() || null,
    weight,
    unit:         document.getElementById('eh-unit').value,
    price_per_lb: parseFloat(document.getElementById('eh-price').value) || null,
    harvest_date: document.getElementById('eh-date').value || null,
    notes:        document.getElementById('eh-notes').value.trim() || null,
  };
  await api(`/api/harvests/${id}`, {method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)});
  closeDialog(false); toast('Harvest updated'); harvest();
}

async function deleteHarvest(id) {
  if (!await confirm('Delete harvest', 'Remove this harvest entry?')) return;
  await api(`/api/harvests/${id}`, {method:'DELETE'});
  toast('Entry deleted'); harvest();
}

// ════════════════════════
// EXPENSES
// ════════════════════════
const EXPENSE_CATEGORIES = ['Seeds', 'Bulbs & Corms', 'Soil & Amendments', 'Lumber', 'Infrastructure', 'Tools', 'Other'];

async function expenses() {
  const main = document.getElementById('main-content');
  main.innerHTML = '<div class="loading">Loading…</div>';
  const data = await api('/api/expenses');

  const total = data.reduce((sum, e) => sum + e.amount, 0);
  const byCategory = {};
  data.forEach(e => { byCategory[e.category] = (byCategory[e.category] || 0) + e.amount; });
  const categorySummary = Object.entries(byCategory)
    .sort((a, b) => b[1] - a[1])
    .map(([cat, amt]) => `<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:0.85rem;">
      <span style="color:var(--text2)">${cat}</span>
      <span style="font-weight:500">$${amt.toFixed(2)}</span>
    </div>`).join('');

  const catOpts = EXPENSE_CATEGORIES.map(c => `<option value="${c}">${c}</option>`).join('');

  main.innerHTML = `
    <div class="page-header">
      <div><div class="page-title">Expenses</div><div class="page-subtitle">Garden costs and investments</div></div>
      <div style="text-align:right;">
        <div style="font-size:1.8rem;font-weight:300;color:var(--text);">$${total.toFixed(2)}</div>
        <div style="font-size:0.75rem;color:var(--muted);">total invested</div>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 260px;gap:16px;align-items:start;">
      <div>
        <div class="panel" style="margin-bottom:16px;">
          <div class="panel-head"><span class="panel-title">Log expense</span></div>
          <div class="form-grid">
            <div class="form-group"><label>Category</label><select id="e-cat">${catOpts}</select></div>
            <div class="form-group"><label>Description *</label><input id="e-desc" placeholder="e.g. Tomato seeds, Cedar boards"></div>
            <div class="form-group"><label>Amount ($) *</label><input type="number" id="e-amount" min="0.01" step="0.01" placeholder="e.g. 12.99"></div>
            <div class="form-group"><label>Date</label><input type="date" id="e-date" value="${new Date().toISOString().split('T')[0]}"></div>
            <div class="form-group span2"><label>Notes</label><input id="e-notes" placeholder="Optional"></div>
          </div>
          <div class="form-actions"><button class="btn btn-primary" onclick="createExpense()">Log expense</button></div>
        </div>
        <div class="panel">
          <div class="panel-head"><span class="panel-title">${data.length} expense${data.length !== 1 ? 's' : ''}</span></div>
          ${expensesTable(data)}
        </div>
      </div>
      <div class="panel" style="padding:16px 18px;">
        <div style="font-size:0.72rem;font-weight:500;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);margin-bottom:12px;">By category</div>
        ${categorySummary || '<div style="color:var(--muted);font-size:0.85rem;">No expenses yet</div>'}
      </div>
    </div>`;
}

function expensesTable(data) {
  if (!data.length) return '<div class="empty">No expenses logged yet</div>';
  return `<table class="tbl">
    <thead><tr><th>Category</th><th>Description</th><th>Amount</th><th>Date</th><th>Notes</th><th></th></tr></thead>
    <tbody>${data.map(e => `<tr>
      <td style="color:var(--text2)">${e.category}</td>
      <td>${e.description}</td>
      <td style="font-weight:500">$${e.amount.toFixed(2)}</td>
      <td style="color:var(--muted)">${fmtDate(e.expense_date)}</td>
      <td style="color:var(--text2)">${e.notes || ''}</td>
      <td><button class="btn btn-sm btn-danger" onclick="deleteExpense(${e.id})">Delete</button></td>
    </tr>`).join('')}</tbody></table>`;
}

async function createExpense() {
  const desc = document.getElementById('e-desc').value.trim();
  const amount = parseFloat(document.getElementById('e-amount').value);
  if (!desc) { toast('Description required', true); return; }
  if (!amount) { toast('Amount required', true); return; }
  const body = {
    category:     document.getElementById('e-cat').value,
    description:  desc,
    amount,
    expense_date: document.getElementById('e-date').value || null,
    notes:        document.getElementById('e-notes').value.trim() || null,
  };
  await api('/api/expenses', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)});
  toast('Expense logged'); expenses();
}

async function deleteExpense(id) {
  if (!await confirm('Delete expense', 'Remove this expense entry?')) return;
  await api(`/api/expenses/${id}`, {method:'DELETE'});
  toast('Expense deleted'); expenses();
}

// ════════════════════════
// SEED SOURCES
// ════════════════════════
async function sources() {
  const main = document.getElementById('main-content');
  main.innerHTML = '<div class="loading">Loading…</div>';
  const data = await api('/api/seed-sources');
  main.innerHTML = `
    <div class="page-header">
      <div><div class="page-title">Seed Sources</div><div class="page-subtitle">Seed companies, saved seed, and other suppliers</div></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 260px;gap:16px;align-items:start;">
      <div>
        <div class="panel" style="margin-bottom:16px;">
          <div class="panel-head"><span class="panel-title">Add source</span></div>
          <div class="form-grid" style="grid-template-columns:1fr;">
            <div class="form-group"><label>Name *</label><input id="src-name" type="text" placeholder="e.g. Baker Creek, Saved seed, Local farm"></div>
          </div>
          <div class="form-actions"><button class="btn btn-primary" onclick="createSource()">Add source</button></div>
        </div>
        <div class="panel">
          <div class="panel-head"><span class="panel-title">${data.length} source${data.length !== 1 ? 's' : ''}</span></div>
          ${sourcesTable(data)}
        </div>
      </div>
      <div class="panel" style="padding:16px 18px;">
        <div style="font-size:0.72rem;font-weight:500;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);margin-bottom:12px;">Sources</div>
        ${data.length ? data.map(s => `
          <div style="padding:6px 0;border-bottom:1px solid var(--border);font-size:0.85rem;color:var(--text2);">${s.name}</div>
        `).join('') : '<div style="color:var(--muted);font-size:0.85rem;">No sources yet</div>'}
      </div>
    </div>`;
}

function sourcesTable(data) {
  if (!data.length) return '<div class="empty">No sources added yet</div>';
  return `<table class="tbl">
    <thead><tr><th>Name</th><th></th></tr></thead>
    <tbody>${data.map(s => `<tr>
      <td style="font-weight:500;">${s.name}</td>
      <td><button class="btn btn-sm btn-danger" onclick="deleteSource(${s.id},'${s.name}')">Delete</button></td>
    </tr>`).join('')}</tbody></table>`;
}

async function createSource() {
  const name = document.getElementById('src-name').value.trim();
  if (!name) { document.getElementById('src-name').focus(); return; }
  await api('/api/seed-sources', { method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ name }) });
  toast('Source added'); sources();
}

async function deleteSource(id, name) {
  if (!await confirm('Delete source', `Remove "${name}"?`)) return;
  await api(`/api/seed-sources/${id}`, { method:'DELETE' });
  toast('Source deleted'); sources();
}
