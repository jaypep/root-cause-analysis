<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Root Cause Analysis</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #f4f7f0;
      --bg2:       #eaf0e4;
      --bg3:       #dde8d5;
      --border:    #c5d8b8;
      --border2:   #8db87a;
      --text:      #1e2d17;
      --text2:     #3d5c2e;
      --text3:     #6b8f5a;
      --green:     #3a7a28;
      --green-dim: #5a8a46;
      --amber:     #8a6a10;
      --red:       #8a3a2a;
      --blue:      #2a5c7a;
      --blue-dim:  #1a3c5a;
      --surface:   #eaf0e4;
      --muted:     #6b8f5a;
      --radius:    16px;
    }
    :root.dark {
      --bg:        #0d1109;
      --bg2:       #141a10;
      --bg3:       #1c2417;
      --border:    #2a3822;
      --border2:   #3d5430;
      --text:      #c8d5b9;
      --text2:     #7a9068;
      --text3:     #4a5e3a;
      --green:     #8db87a;
      --green-dim: #4a7a28;
      --amber:     #d4942a;
      --red:       #c0443a;
      --blue:      #4a90a4;
      --blue-dim:  #2d5f70;
      --surface:   #182417;
      --muted:     #6a8060;
      --radius:    16px;
    }
    .theme-toggle {
      background: transparent;
      border: 1px solid var(--border2);
      color: var(--text2);
      font-size: 14px;
      width: 30px; height: 30px;
      border-radius: 6px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
      padding: 0;
      flex-shrink: 0;
    }
    .theme-toggle:hover { background: var(--border); color: var(--text); }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      overflow: hidden;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 28px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem;
      font-weight: 500;
      color: var(--green);
    }

    #clock { font-size: 1.4rem; font-weight: 300; letter-spacing: 0.05em; }
    #date  { font-size: 0.75rem; color: var(--muted); text-align: right; margin-top: 2px; }

    /* Main area */
    main {
      display: grid;
      grid-template-rows: auto auto 1fr;
      gap: 16px;
      padding: 16px 28px;
      overflow: hidden;
      min-height: 0;
    }

    /* Stats row */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 18px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .stat-value { font-size: 2rem; font-weight: 300; line-height: 1; }
    .stat-label { font-size: 0.65rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }

    /* Weather panel */
    .weather-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      display: grid;
      grid-template-columns: 200px 1fr;
      overflow: hidden;
      min-height: 0;
    }

    /* Left: current conditions */
    .wx-current {
      padding: 24px 20px;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 8px;
    }

    .wx-icon   { font-size: 3rem; line-height: 1; }
    .wx-temp   { font-size: 3rem; font-weight: 300; line-height: 1; }
    .wx-desc   { font-size: 0.8rem; color: var(--muted); line-height: 1.4; }
    .wx-meta   { font-size: 0.65rem; color: var(--muted); opacity: 0.6; text-transform: uppercase; letter-spacing: 0.1em; margin-top: 4px; }

    .wx-range  { display: flex; gap: 12px; align-items: center; margin-top: 8px; }
    .wx-high   { color: var(--amber); font-size: 1rem; font-weight: 500; }
    .wx-low    { color: var(--blue);  font-size: 1rem; }
    .wx-sep    { color: var(--muted); }

    .wx-wind {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .wx-wind-row {
      display: flex;
      align-items: baseline;
      gap: 6px;
    }

    .wx-wind-value {
      font-size: 1.1rem;
      font-weight: 300;
      color: var(--text);
    }

    .wx-wind-gust {
      font-size: 1.1rem;
      font-weight: 500;
      color: var(--amber);
    }

    .wx-wind-label {
      font-size: 0.65rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .wx-wind-dir {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 2px;
    }

    /* Right: rainfall chart */
    .wx-rainfall {
      display: grid;
      grid-template-rows: auto 1fr auto;
      padding: 20px 24px 16px;
      gap: 12px;
      min-height: 0;
    }

    .wx-rainfall-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
    }

    .wx-rainfall-title {
      font-size: 0.65rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
    }

    .wx-total {
      font-size: 0.8rem;
      color: var(--blue);
      font-weight: 500;
    }

    /* Bar chart */
    .rain-chart {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      min-height: 0;
    }

    .rain-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 100%;
      gap: 0;
    }

    .rain-amount {
      font-size: 0.72rem;
      color: var(--blue);
      font-weight: 500;
      min-height: 1.2em;
      text-align: center;
      margin-bottom: 4px;
    }

    .rain-amount.zero { color: var(--muted); opacity: 0.4; }

    .rain-bar-area {
      flex: 1;
      width: 100%;
      display: flex;
      align-items: flex-end;
    }

    .rain-bar {
      width: 100%;
      background: var(--blue-dim);
      border-radius: 4px 4px 0 0;
      border: 1px solid var(--blue);
      border-bottom: none;
      transition: height 0.5s ease;
    }

    .rain-bar.has-rain { background: var(--blue); }
    .rain-bar.zero-rain { background: transparent; border-color: transparent; height: 2px !important; border-radius: 0; }

    /* x-axis line */
    .rain-axis {
      width: 100%;
      height: 1px;
      background: var(--border);
    }

    /* Day labels */
    .rain-labels {
      display: flex;
      gap: 8px;
    }

    .rain-label-col {
      flex: 1;
      text-align: center;
    }

    .rain-day-name { font-size: 0.72rem; color: var(--text); }
    .rain-day-date { font-size: 0.6rem;  color: var(--muted); margin-top: 1px; }

    /* Today highlight */
    .rain-col.today .rain-bar.has-rain { background: var(--green); border-color: var(--green); }
    .rain-col.today .rain-amount       { color: var(--green); }
    .rain-col.today .rain-day-name     { color: var(--green); font-weight: 500; }

    /* Footer */
    footer {
      display: flex;
      gap: 12px;
      padding: 12px 28px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .nav-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      padding: 10px 22px;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: border-color 0.15s, color 0.15s;
    }
    .nav-btn:hover { border-color: var(--green-dim); color: var(--text); }

    .empty { color: var(--muted); font-size: 0.82rem; padding: 20px; text-align: center; }

    /* Tasks widget */
    .tasks-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .task-row {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 18px;
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }
    .task-row:last-child { border-bottom: none; }

    .task-check {
      width: 22px;
      height: 22px;
      border-radius: 6px;
      border: 1.5px solid var(--border);
      background: var(--bg);
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      transition: background 0.15s, border-color 0.15s;
    }
    .task-check:hover { border-color: var(--green-dim); }
    .task-check.done  { background: var(--green-dim); border-color: var(--green-dim); color: #fff; }

    .task-info { flex: 1; min-width: 0; }
    .task-title { font-size: 0.9rem; font-weight: 500; }
    .task-sub   { font-size: 0.7rem; color: var(--muted); margin-top: 2px; }

    .task-badge {
      font-size: 0.65rem;
      font-weight: 500;
      padding: 3px 8px;
      border-radius: 99px;
      flex-shrink: 0;
    }
    .badge-overdue  { background: var(--red);      color: #fff; }
    .badge-today    { background: var(--amber);    color: #fff; }
    .badge-upcoming { background: var(--border);   color: var(--muted); }
    .badge-auto     { background: var(--green-dim); color: #fff; }

    .type-icon { font-size: 1rem; flex-shrink: 0; }
  </style>
  <script src="/static/theme.js"></script>
</head>
<body>

<header>
  <h1>🌱 Root Cause Analysis</h1>
  <div>
    <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme"></button>
    <div id="clock">--:--</div>
    <div id="date"></div>
  </div>
</header>

<main>
  <!-- Stats row -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-value" id="stat-plants">—</div>
      <div class="stat-label">Plants</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="stat-beds">—</div>
      <div class="stat-label">Beds</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="stat-overdue">—</div>
      <div class="stat-label">Overdue</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="stat-crops">—</div>
      <div class="stat-label">Crop types</div>
    </div>
  </div>

  <!-- Tasks panel -->
  <div class="tasks-panel">
    <a href="/tasks" style="display:flex;align-items:center;justify-content:space-between;padding:12px 18px;border-bottom:1px solid var(--border);text-decoration:none;cursor:pointer;transition:background 0.15s;" onmouseover="this.style.background='var(--border)'" onmouseout="this.style.background=''">
      <h2 style="font-size:0.65rem;font-weight:500;text-transform:uppercase;letter-spacing:0.12em;color:var(--muted);">Tasks</h2>
      <span style="font-size:0.8rem;color:var(--muted);">View all →</span>
    </a>
    <div id="task-list">
      <div class="empty">Loading…</div>
    </div>
  </div>

  <!-- Weather panel -->
  <div class="weather-panel">

    <!-- Current conditions -->
    <div class="wx-current">
      <div class="wx-icon" id="wx-icon">—</div>
      <div class="wx-temp" id="wx-temp">—°</div>
      <div class="wx-desc" id="wx-desc">Loading weather…</div>
      <div class="wx-range">
        <span class="wx-high" id="wx-high">—°</span>
        <span class="wx-sep">↕</span>
        <span class="wx-low" id="wx-low">—°</span>
      </div>
      <div class="wx-meta" id="wx-meta">KROG · 7-day range</div>
      <div class="wx-wind">
        <div class="wx-wind-row">
          <span class="wx-wind-value" id="wx-wind-speed">—</span>
          <span class="wx-wind-label">mph</span>
          <span class="wx-wind-label" style="margin-left:4px">sustained</span>
        </div>
        <div class="wx-wind-row">
          <span class="wx-wind-gust" id="wx-wind-gust">—</span>
          <span class="wx-wind-label">mph</span>
          <span class="wx-wind-label" style="margin-left:4px">gusts</span>
        </div>
        <div class="wx-wind-dir" id="wx-wind-dir">— °</div>
      </div>
    </div>

    <!-- Rainfall chart -->
    <div class="wx-rainfall">
      <div class="wx-rainfall-header">
        <span class="wx-rainfall-title">Rainfall — last 7 days (inches)</span>
        <span class="wx-total" id="wx-total">— in total</span>
      </div>

      <div class="rain-chart" id="rain-chart">
        <div class="empty">Loading…</div>
      </div>

      <div>
        <div class="rain-axis"></div>
        <div class="rain-labels" id="rain-labels"></div>
      </div>
    </div>
  </div>
</main>

<footer>
  <a class="nav-btn" href="/manage">⚙ Manage</a>
  <a class="nav-btn" href="/settings">⚙ Settings</a>
</footer>

<script>
  // Clock
  function tick() {
    const now = new Date();
    document.getElementById('clock').textContent =
      now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    document.getElementById('date').textContent =
      now.toLocaleDateString([], { weekday: 'long', month: 'long', day: 'numeric' });
  }
  tick();
  setInterval(tick, 1000);

  function wxIcon(desc) {
    if (!desc) return '🌡';
    const d = desc.toLowerCase();
    if (d.includes('thunder')) return '⛈';
    if (d.includes('snow'))    return '❄';
    if (d.includes('rain') || d.includes('drizzle')) return '🌧';
    if (d.includes('overcast') || d.includes('cloudy')) return '☁';
    if (d.includes('partly'))  return '⛅';
    if (d.includes('clear') || d.includes('sunny') || d.includes('fair')) return '☀';
    if (d.includes('fog') || d.includes('mist')) return '🌫';
    return '🌡';
  }

  const TASK_ICONS = {
    water:       '💧',
    pests:       '🐛',
    fertilize:   '🌿',
    harvest:     '🌽',
    sow_indoors: '🪴',
    sow_outdoors:'🌱',
    transplant:  '⛏️',
  };

  function taskDueBadge(dueDate) {
    if (!dueDate) return { label: '', cls: '' };
    const days = Math.ceil((new Date(dueDate) - new Date()) / 864e5);
    if (days < 0)  return { label: 'Overdue',  cls: 'badge-overdue' };
    if (days === 0) return { label: 'Today',    cls: 'badge-today' };
    if (days === 1) return { label: 'Tomorrow', cls: 'badge-today' };
    return { label: `In ${days}d`, cls: 'badge-upcoming' };
  }

  async function syncAndLoadTasks() {
    // Fire sync in background — don't block render
    fetch('/api/tasks/sync', { method: 'POST' }).catch(() => {});
    const tasks = await fetch('/api/tasks').then(r => r.json());
    const list  = document.getElementById('task-list');

    if (tasks.length === 0) {
      list.innerHTML = '<div class="empty">No open tasks 🎉</div>';
      return;
    }

    list.innerHTML = tasks.slice(0, 5).map(t => {
      const badge = taskDueBadge(t.due_date);
      const icon  = TASK_ICONS[t.type] || '📋';
      const auto  = t.title === 'Water garden';
      return `<div class="task-row">
        <div class="task-check ${t.done ? 'done' : ''}" onclick="toggleTask(${t.id}, this)">
          ${t.done ? '✓' : ''}
        </div>
        <span class="type-icon">${icon}</span>
        <div class="task-info">
          <div class="task-title">${t.title}</div>
          ${t.notes ? `<div class="task-sub">${t.notes}</div>` : ''}
        </div>
        ${badge.label ? `<span class="task-badge ${badge.cls}">${badge.label}</span>` : ''}
        ${auto ? `<span class="task-badge badge-auto" title="Auto-generated from rainfall">auto</span>` : ''}
      </div>`;
    }).join('');
  }

  async function toggleTask(id, el) {
    const nowDone = !el.classList.contains('done');
    el.classList.toggle('done', nowDone);
    el.textContent = nowDone ? '✓' : '';
    await fetch(`/api/tasks/${id}/done`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ done: nowDone })
    });
    setTimeout(syncAndLoadTasks, 400);
  }

  async function loadGardenData() {
    const [plants, beds, schedules, crops] = await Promise.all([
      fetch('/api/plants').then(r => r.json()),
      fetch('/api/beds').then(r => r.json()),
      fetch('/api/schedules').then(r => r.json()),
      fetch('/api/crops').then(r => r.json()),
    ]);

    const today = new Date();
    const overdue = schedules.filter(s => {
      if (!s.next_due) return false;
      return new Date(s.next_due) < today;
    }).length;

    document.getElementById('stat-plants').textContent  = plants.length;
    document.getElementById('stat-beds').textContent    = beds.length;
    document.getElementById('stat-overdue').textContent = overdue;
    document.getElementById('stat-crops').textContent   = crops.length;
  }

  async function loadWeather() {
    try {
      const data = await fetch('/api/weather').then(r => r.json());

      // Current conditions
      const cur = data.current;
      document.getElementById('wx-temp').textContent = cur.temp_f != null ? `${cur.temp_f}°F` : '—°';
      document.getElementById('wx-desc').textContent = cur.description || '—';
      document.getElementById('wx-icon').textContent = wxIcon(cur.description);

      // Wind
      document.getElementById('wx-wind-speed').textContent =
        cur.wind_speed_mph != null ? cur.wind_speed_mph : '—';
      document.getElementById('wx-wind-gust').textContent =
        cur.wind_gust_mph != null ? cur.wind_gust_mph : '—';
      document.getElementById('wx-wind-dir').textContent =
        cur.wind_dir != null
          ? `${cur.wind_dir} · ${Math.round(cur.wind_dir_deg)}°`
          : '—';

      // 7-day range
      if (data.temp_high != null) {
        document.getElementById('wx-high').textContent = `${data.temp_high.toFixed(0)}°`;
        document.getElementById('wx-low').textContent  = `${data.temp_low.toFixed(0)}°`;
      }

      // Rainfall chart
      const rainfall = data.rainfall; // [{date, inches}, ...]
      const todayStr = new Date().toLocaleDateString('en-CA'); // YYYY-MM-DD local

      const maxIn = Math.max(...rainfall.map(r => r.inches), 0.01);
      const totalIn = rainfall.reduce((s, r) => s + r.inches, 0);
      document.getElementById('wx-total').textContent = `${totalIn.toFixed(2)}" total`;

      const chart  = document.getElementById('rain-chart');
      const labels = document.getElementById('rain-labels');

      chart.innerHTML = rainfall.map(r => {
        const isToday  = r.date === todayStr;
        const hasRain  = r.inches >= 0.005;
        const pct      = hasRain ? Math.max((r.inches / maxIn) * 100, 4) : 0;
        const amtLabel = hasRain ? `${r.inches.toFixed(2)}"` : '—';

        return `<div class="rain-col${isToday ? ' today' : ''}">
          <div class="rain-amount${hasRain ? '' : ' zero'}">${amtLabel}</div>
          <div class="rain-bar-area">
            <div class="rain-bar ${hasRain ? 'has-rain' : 'zero-rain'}" style="height:${pct}%"></div>
          </div>
        </div>`;
      }).join('');

      labels.innerHTML = rainfall.map(r => {
        const isToday = r.date === todayStr;
        const d = new Date(r.date + 'T12:00:00');
        const dayName = d.toLocaleDateString([], { weekday: 'short' });
        const dayDate = d.toLocaleDateString([], { month: 'numeric', day: 'numeric' });
        return `<div class="rain-label-col">
          <div class="rain-day-name">${isToday ? 'Today' : dayName}</div>
          <div class="rain-day-date">${dayDate}</div>
        </div>`;
      }).join('');

    } catch (e) {
      document.getElementById('wx-desc').textContent = 'Weather unavailable';
      console.error(e);
    }
  }

  loadGardenData();
  loadWeather();
  syncAndLoadTasks();
  setInterval(loadGardenData, 60000);
  setInterval(loadWeather, 600000);
  setInterval(syncAndLoadTasks, 300000);
</script>
</body>
</html>
